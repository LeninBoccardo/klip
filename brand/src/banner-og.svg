<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#241E19"/>
      <stop offset="1" stop-color="#15110E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#4A3A28" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4A3A28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0.12" y1="0.08" x2="0.88" y2="0.94">
      <stop offset="0" stop-color="#F7D488"/>
      <stop offset="0.5" stop-color="#EAB44C"/>
      <stop offset="1" stop-color="#D89B33"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative oversized frame motif, faint -->
  <rect x="905" y="350" width="430" height="430" rx="108" fill="none"
        stroke="url(#gold)" stroke-width="40" opacity="0.07"/>
  <rect x="-120" y="-150" width="320" height="320" rx="80" fill="none"
        stroke="url(#gold)" stroke-width="34" opacity="0.06"/>

  <!-- badge (150px) -->
  <g transform="translate(372,196) scale(0.146484)">
    <rect width="1024" height="1024" rx="184" fill="#1C1815"/>
    <rect width="1024" height="1024" rx="184" fill="url(#glow)"/>
    <g transform="translate(0 25)">
      <rect x="246" y="246" width="532" height="532" rx="132" fill="none"
            stroke="url(#gold)" stroke-width="74" stroke-linejoin="round"/>
      <rect x="468" y="159" width="88" height="124" rx="30" fill="url(#gold)"/>
      <path d="M470 436 L470 588 L598 512 Z" fill="url(#gold)"
            stroke="url(#gold)" stroke-width="30" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="566" y="318" text-anchor="start"
        font-family="'Geist','Inter',system-ui,sans-serif" font-weight="600"
        font-size="142" letter-spacing="-4" fill="#F5ECD5">Klip</text>

  <!-- tagline -->
  <text x="600" y="430" text-anchor="middle"
        font-family="'Geist','Inter',system-ui,sans-serif" font-weight="400"
        font-size="38" letter-spacing="0.3" fill="#C9BBA2">A warm, offline vault for your videos and the clips you keep.</text>
</svg>
