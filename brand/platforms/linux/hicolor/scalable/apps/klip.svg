<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241E19"/>
      <stop offset="1" stop-color="#16110E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.40" r="0.62">
      <stop offset="0" stop-color="#4A3A28" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4A3A28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0.12" y1="0.08" x2="0.88" y2="0.94">
      <stop offset="0" stop-color="#F7D488"/>
      <stop offset="0.5" stop-color="#EAB44C"/>
      <stop offset="1" stop-color="#D89B33"/>
    </linearGradient>
  </defs>

  <!-- deep espresso rounded-square (~18% radius) -->
  <rect width="1024" height="1024" rx="184" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="184" fill="url(#glow)"/>

  <!-- clip mark: a single film frame cradling a play head; recentred (+25y) so the
       top trim tab keeps the whole mark bbox-centred (vbbox 184–840, margins 184/184) -->
  <g id="primary-mark" transform="translate(0 25)">
    <rect x="246" y="246" width="532" height="532" rx="132" fill="none"
          stroke="url(#gold)" stroke-width="74" stroke-linejoin="round"/>
    <!-- trim / scrubber notch: a single tab centred on the top rail (x=512),
         fused into the stroke, reads as an in/out trim point — "mark a moment, cut it" -->
    <rect x="468" y="159" width="88" height="124" rx="30" fill="url(#gold)"/>
    <path d="M470 436 L470 588 L598 512 Z" fill="url(#gold)"
          stroke="url(#gold)" stroke-width="30" stroke-linejoin="round"/>
  </g>
</svg>
