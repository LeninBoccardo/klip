# Dev-only updater feed. The production feed (app-update.yml) is generated by
# electron-builder from the publish block in electron-builder.yml. In normal dev
# the updater is the no-op DisabledUpdater, so this is only read when forcing a
# real update check locally — point it at the same GitHub Releases feed as prod.
provider: github
owner: LeninBoccardo
repo: klip
updaterCacheDirName: klip-updater
